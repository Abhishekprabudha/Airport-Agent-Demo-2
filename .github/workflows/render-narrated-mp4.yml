name: Render narrated airport demo MP4

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate narration MP3
        run: python3 scripts/generate_narration.py

      - name: Render narrated MP4
        run: python3 scripts/render_mp4.py

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: airport-agent-demo-narrated-mp4
          path: dist/airport-agent-demo-narrated.mp4
