<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIonOS x SMART Airport Agent Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <video id="bgVideo" class="bg-video" autoplay muted loop playsinline></video>
    <div class="wash"></div>
    <header class="topbar">
      <div>
        <div class="eyebrow">SMART AXIATA × AIonOS</div>
        <h1>Airport AI Agent Command Centre</h1>
      </div>
      <div class="timer"><span id="clock">00:00</span> / 03:00</div>
    </header>

    <section class="hero-card">
      <div id="section" class="section">AIonOS x SMART Aviation AI</div>
      <h2 id="headline">Unified Airport Command Centre</h2>
      <p id="caption">AIonOS opens a live airport intelligence layer across landside, terminal, airside and building systems.</p>
      <div class="controls">
        <button id="playBtn">▶ Start narrated demo</button>
        <button id="muteBtn" class="ghost">Voice: On</button>
        <button id="resetBtn" class="ghost">Reset</button>
      </div>
    </section>

    <aside class="agent-panel">
      <div class="panel-title">Active AI Agents</div>
      <div id="agents" class="agents"></div>
    </aside>

    <section class="kpi-panel">
      <div id="kpis" class="kpis"></div>
    </section>

    <section class="timeline">
      <div id="progress" class="progress"></div>
      <div class="ticks">
        <span>Landside</span><span>Terminal</span><span>Airside</span><span>BMS</span><span>Executive View</span>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
